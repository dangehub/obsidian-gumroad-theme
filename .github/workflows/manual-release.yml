name: 🎯 Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.7)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional, leave empty to auto-generate)'
        required: false
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  manual-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式无效！请使用语义化版本 (如: 0.1.7)"
            exit 1
          fi
          echo "✅ 版本号格式有效: $VERSION"

      - name: 📝 Update manifest.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          jq ".version = \"$VERSION\"" manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json
          echo "✅ manifest.json 版本更新至 $VERSION"

      - name: 📝 Generate Release Notes
        run: |
          THEME_NAME=$(jq -r '.name' manifest.json)
          VERSION="${{ github.event.inputs.version }}"
          CUSTOM_NOTES="${{ github.event.inputs.release_notes }}"

          if [ -n "$CUSTOM_NOTES" ]; then
            cat > /tmp/release_body.md << EOF
          ## $THEME_NAME v$VERSION

          ### 更新说明

          $CUSTOM_NOTES

          ### 包含文件

          - \`theme.css\` - 主题样式文件
          - \`manifest.json\` - 主题配置

          ### 快速使用

          1. 下载 \`theme.css\`
          2. 在 Obsidian 设置 → 外观 → 主题 → 管理 → 手动安装主题
          3. 选择并应用主题

          ---

          *发布于 $(date '+%Y-%m-%d %H:%M:%S')*
          EOF
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              CHANGES=$(git log --pretty=format:"- %s" "$LAST_TAG"..HEAD 2>/dev/null || git log --pretty=format:"- %s" -5)
            else
              CHANGES=$(git log --pretty=format:"- %s" -10)
            fi
            if [ -z "$CHANGES" ]; then
              CHANGES="- 优化和改进"
            fi

            cat > /tmp/release_body.md << EOF
          ## $THEME_NAME v$VERSION

          ### 本次更新内容

          $CHANGES

          ### 包含文件

          - \`theme.css\` - 主题样式文件
          - \`manifest.json\` - 主题配置

          ### 快速使用

          1. 下载 \`theme.css\`
          2. 在 Obsidian 设置 → 外观 → 主题 → 管理 → 手动安装主题
          3. 选择并应用主题

          ---

          *发布于 $(date '+%Y-%m-%d %H:%M:%S')*
          EOF
          fi

      - name: 🔐 Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: 🏷️ Create and Push Tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "⚠️ 标签 $VERSION 已存在，将覆盖"
            git tag -f -a "$VERSION" -m "Release $VERSION"
          else
            git tag -a "$VERSION" -m "Release $VERSION"
          fi
          git push origin "$VERSION" --force
          echo "✅ 标签 $VERSION 已创建并推送"

      - name: 📦 Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PRERELEASE="${{ github.event.inputs.is_prerelease }}"
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file /tmp/release_body.md \
            $PRERELEASE_FLAG \
            theme.css manifest.json
          echo "✅ 发布完成！版本: $VERSION"
